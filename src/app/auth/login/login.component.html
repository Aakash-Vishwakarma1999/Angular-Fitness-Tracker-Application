
<section>
    <form [formGroup]="reactiveForm" (ngSubmit)="onFormSubmit()" id="container">
        <mat-form-field >
            <mat-label>Email</mat-label>
            <input matInput placeholder="Enter email" formControlName="email">
            <mat-error *ngIf="reactiveForm.get('email')?.errors?.['required']">Email is required</mat-error>
            <mat-error *ngIf="reactiveForm.get('email')?.errors?.['email']">Enter a valid email</mat-error>
        </mat-form-field>
        <mat-form-field >
            <mat-label>Password</mat-label>
            <input matInput placeholder="Enter password" formControlName="password">
            <mat-error *ngIf="reactiveForm.get('password')?.errors?.['required']">Password is required</mat-error>
        </mat-form-field>

        <button *ngIf ="!isLoading" mat-raised-button type="submit" [disabled]="reactiveForm.invalid" color="primary">Submit</button>
        <mat-spinner *ngIf="isLoading"></mat-spinner>
    </form>
</section>
