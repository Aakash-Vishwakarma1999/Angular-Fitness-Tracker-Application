<section class="container">

    <form (ngSubmit)="onstartTraining(f)" #f="ngForm">
        <mat-card class="new-training">
        <mat-card-title>Time to start a workout</mat-card-title>
        <mat-card-content>
            <mat-form-field *ngIf="!isExerciseValueLoaded && exercises">
                <mat-label>Choose Exercise</mat-label>
                <mat-select ngModel name="exercise" required>

                    <mat-option *ngFor="let exercise of exercises " [value]="exercise.id">
                        {{exercise.name}}
                    </mat-option>

                </mat-select>
            </mat-form-field>
            <mat-spinner *ngIf="isExerciseValueLoaded"></mat-spinner>
        </mat-card-content>
        <mat-card-actions *ngIf="!isExerciseValueLoaded">
            <button *ngIf="exercises" type="submit" mat-button [disabled]="f.invalid">Start</button>
            <button *ngIf="!exercises" type="button" mat-button (click)="fetchExercises()   " >Fetch again</button>
        </mat-card-actions>
    </mat-card>
    </form>
    
</section>
